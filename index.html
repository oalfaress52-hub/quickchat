<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-body">
  <main class="landing-shell">
    <section class="landing-card" aria-label="Welcome to Kite">
      <p class="landing-eyebrow">Social in the cloud</p>
      <h1 data-i18n="index.welcome">Welcome to Kite</h1>
      <p class="landing-subtitle">
        Share quick winds, discover people, and keep your profile in sync across devices.
      </p>

      <div class="landing-actions">
        <button class="primary-btn" onclick="location.href='login.html'" data-i18n="index.login">Login</button>
        <button class="secondary-btn" onclick="location.href='signup.html'" data-i18n="index.create">Create Account</button>
      </div>

      <ul class="landing-highlights" aria-label="Platform highlights">
        <li>🪁 Real-time wind feed and interactions</li>
        <li>🔒 Policy-gated, account-based access</li>
        <li>🌍 Built-in language support</li>
      </ul>
    </section>
  </main>

  <script src="policy.js"></script>
  <script src="i18n.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", async () => {
      if (window.KITE_I18N) await window.KITE_I18N.applyLanguage(document);
      if (window.KITE_POLICY) {
        await window.KITE_POLICY.requireLocalPolicyAcceptance({
          title: "Welcome to Kite",
          subtitle: "You must accept Kite policy before entering login or signup."
        });
      }
    });
  </script>
</body>
</html>
